<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body{
    margin:0;
    font-family:'Pretendard', sans-serif;
    background:#faf8f5;
    color:#333;
    text-align:center;
}

.hero{
    height:70vh;
    background:url("main.jpg") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-text{
    background:rgba(255,255,255,0.75);
    padding:30px;
    border-radius:20px;
}

h1{
    font-weight:300;
    letter-spacing:4px;
}

.section{
    padding:60px 24px;
}

.date{
    font-size:1.3rem;
    margin-top:10px;
}

.message{
    line-height:1.9;
    max-width:500px;
    margin:auto;
}

.gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-width:700px;
    margin:auto;
}

.gallery img{
    width:100%;
    border-radius:12px;
}

.location{
    background:white;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 24px;
    background:#d8b89f;
    color:white;
    text-decoration:none;
    border-radius:999px;
}

.footer{
    padding:40px;
    color:#888;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-text">
        <h1>WEDDING</h1>
        <p>수연 ♥ 신랑이름</p>
    </div>
</div>

<div class="section">
    <h2>초대합니다</h2>

    <p class="message">
        서로를 향한 따뜻한 마음으로<br>
        같은 길을 걸어가려 합니다.<br><br>

        소중한 분들을 모시고<br>
        기쁨의 순간을 함께 나누고자 합니다.
    </p>
</div>

<div class="section">
    <h2>예식 안내</h2>
    <div class="date">
        2026년 10월 18일 일요일<br>
        오후 1시
    </div>
</div>

<div class="section">
    <h2>갤러리</h2>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
        <img src="photo4.jpg">
    </div>
</div>

<div class="section location">
    <h2>오시는 길</h2>

    <p>
        다온컨벤션 송파문정<br>
        서울특별시 송파구 ...
    </p>

    <a class="btn"
       href="https://map.naver.com"
       target="_blank">
       지도 보기
    </a>
</div>

<div class="section">
    <h2>마음 전하실 곳</h2>

    <p>
        신부 수연<br>
        카카오뱅크 1234-56-789012
    </p>
</div>

<div class="footer">
    감사합니다
</div>

</body>
</html>
